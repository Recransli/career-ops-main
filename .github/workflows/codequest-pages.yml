name: Deploy Code Conquest to Pages

# Publishes the codequest/ folder as a static site.
# Everything is plain HTML/CSS/JS — no build step, no bundler.
# Python runs client-side via Pyodide, loaded from a CDN at runtime.

on:
  push:
    branches: [main]
    paths:
      - 'codequest/**'
      - '.github/workflows/codequest-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # world.js is an ES module: `node --check` parses bare .js as
      # CommonJS, so parse a temporary .mjs copy for that one.
      - name: Sanity-check the game's JavaScript
        run: |
          for f in codequest/js/*.js; do
            if grep -qE '^\s*import ' "$f"; then
              cp "$f" /tmp/check.mjs && node --check /tmp/check.mjs
            else
              node --check "$f"
            fi
          done
          echo "All JS parsed cleanly."

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload codequest/ as the site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: codequest

      - id: deployment
        uses: actions/deploy-pages@v4
