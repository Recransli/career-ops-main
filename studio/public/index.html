<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Career-Ops Studio</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23d97757'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Georgia'>✦</text></svg>" />
</head>
<body>
  <!-- Immersive three.js background (journey scene) -->
  <canvas id="bg"></canvas>

  <div id="shell">
    <header class="topbar">
      <div class="brand"><span class="spark">✦</span> Studio</div>
      <nav class="journey-rail" id="journey-rail"></nav>
      <div class="top-links">
        <button class="link-btn" data-overlay="reports">Reports</button>
        <button class="link-btn" data-overlay="settings">Model</button>
      </div>
    </header>
    <main id="view"></main>
  </div>

  <div class="overlay" id="overlay" hidden>
    <div class="overlay-card">
      <button class="overlay-close" id="overlay-close">×</button>
      <div id="overlay-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- In-browser file extraction (loaded lazily on demand by app.js):
       pdf.js for PDFs, mammoth for DOCX. three.js powers the background. -->
  <script src="/journey-bg.js" type="module"></script>
  <script src="/app.js"></script>
</body>
</html>
